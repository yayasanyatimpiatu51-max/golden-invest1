<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Login / Register</h2>

<input id="email" placeholder="Masukkan email">

<button onclick="login()">Masuk / Daftar</button>

<p>Jika belum punya akun, cukup masukkan email → otomatis dibuat</p>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://fqqhekmxkrwatfhephpr.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."
);

window.login = async () => {
  const email = document.getElementById("email").value;

  if(!email){
    alert("Masukkan email dulu");
    return;
  }

  const { error } = await supabase.auth.signInWithOtp({
    email,
    options: {
      emailRedirectTo: "https://golden-invest1.vercel.app/dashboard.html"
    }
  });

  if(error){
    alert(error.message);
  } else {
    alert("Cek email kamu untuk login");
  }
};
</script>

</body>
</html>
