<script>
function withdraw() {
  let amount = parseFloat(document.getElementById("amount").value);

  if (!amount || amount <= 0) {
    alert("Masukkan jumlah withdraw");
    return;
  }

  // 🔒 MIN & MAX
  if (amount < 50000) {
    alert("Minimum withdraw bank Rp50.000");
    return;
  }

  if (amount > 1000000000) {
    alert("Maximum withdraw Rp1.000.000.000");
    return;
  }

  // 💰 FEE SYSTEM
  let feePercent;

  if (amount < 1000000) {
    feePercent = 2.5;
  } else if (amount <= 50000000) {
    feePercent = 2;
  } else {
    feePercent = 1.5;
  }

  let fee = amount * (feePercent / 100);
  let receive = amount - fee;

  // ⏰ TIME SYSTEM
  let now = new Date();
  let day = now.getDay(); // 0 = Minggu
  let hour = now.getHours();

  let message = "";

  if (day === 0) {
    message = "Withdraw diproses hari Senin";
  } else if (hour >= 17) {
    message = "Diproses hari kerja berikutnya (cut-off 17:00)";
  } else {
    message = "Diproses hari ini";
  }

  alert(
    "Withdraw berhasil diajukan\n\n" +
    "Amount: Rp" + amount.toLocaleString() + "\n" +
    "Fee (" + feePercent + "%): Rp" + fee.toLocaleString() + "\n" +
    "Diterima: Rp" + receive.toLocaleString() + "\n\n" +
    message
  );
}
</script>
