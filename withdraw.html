<!DOCTYPE html>
<html>
<body>

<h2>Withdraw</h2>

<input id="amount">
<button onclick="submit()">Kirim</button>

<script>
const URL="https://fqqhekmxkrwatfhephpr.supabase.co";
const KEY="PASTE_KEY_KAMU";

let user=localStorage.getItem("user");

async function submit(){
  let amount=document.getElementById("amount").value;

  await fetch(URL+"/rest/v1/transactions",{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      apikey:KEY,
      Authorization:"Bearer "+KEY
    },
    body:JSON.stringify({
      email:user,
      type:"withdraw",
      amount:amount,
      status:"pending"
    })
  });

  alert("Withdraw dikirim");
}
</script>

</body>
</html>
