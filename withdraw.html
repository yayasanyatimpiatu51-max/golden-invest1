<!DOCTYPE html>
<html>
<head>
<title>Withdraw</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Withdraw</h2>

<input type="number" id="amount" placeholder="Jumlah">

<button onclick="withdraw()">Submit</button>

<script>
function withdraw(){
  let a=parseFloat(document.getElementById("amount").value);

  if(!a || a<=0){alert("Masukkan jumlah");return;}
  if(a<50000){alert("Min Rp50.000");return;}
  if(a>1000000000){alert("Max Rp1.000.000.000");return;}

  let fee;
  if(a<1000000){fee=2.5;}
  else if(a<=50000000){fee=2;}
  else{fee=1.5;}

  let f=a*(fee/100);
  let r=a-f;

  let now=new Date();
  let day=now.getDay();
  let hour=now.getHours();

  let msg="";
  if(day===0){msg="Diproses Senin";}
  else if(hour>=17){msg="Diproses besok";}
  else{msg="Diproses hari ini";}

  alert(
    "Amount: "+a+
    "\nFee: "+f+
    "\nReceive: "+r+
    "\n"+msg
  );
}
</script>

</body>
</html>
