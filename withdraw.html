<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Withdraw - Golden Investment</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(135deg, #0b0b0f, #111);
  color: #d4af37;
  text-align: center;
}

.card {
  display: inline-block;
  padding: 30px;
  margin-top: 80px;
  background: #111;
  border: 1px solid #d4af37;
  border-radius: 12px;
}

input {
  display: block;
  margin: 10px auto;
  padding: 10px;
  width: 220px;
}

button {
  padding: 10px 20px;
  background: gold;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>Withdraw</h2>

  <input type="number" id="amount" placeholder="Amount">
  <input type="text" placeholder="Bank Name">
  <input type="text" placeholder="Account Number">

  <button onclick="withdraw()">Submit</button>

  <p id="info"></p>
</div>

<script>
function withdraw() {
  let amount = document.getElementById("amount").value;
  let fee = amount * 0.02;
  let receive = amount - fee;

  let now = new Date();
  let day = now.getDay();
  let hour = now.getHours();

  if (day === 0) {
    document.getElementById("info").innerText = "Withdraw processed on Monday";
    return;
  }

  if (hour >= 17) {
    document.getElementById("info").innerText = "Processed next working day";
  } else {
    document.getElementById("info").innerText = "Processing today";
  }

  alert("Withdraw submitted\nFee: $" + fee.toFixed(2) + "\nReceive: $" + receive.toFixed(2));
}
</script>

</body>
</html>
