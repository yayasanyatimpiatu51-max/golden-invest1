<!DOCTYPE html>
<html>
<body>

<h2>Withdraw</h2>

<input id="amount">
<button onclick="submit()">Kirim</button>

<script type="module">
import { supabase, getUser } from "./app.js";

window.submit = async ()=>{
  let amount=parseFloat(document.getElementById("amount").value);

  await supabase.from("transactions").insert([{
    email:getUser(),
    type:"withdraw",
    amount,
    status:"pending"
  }]);

  alert("Menunggu admin");
};
</script>

</body>
</html>
