<!DOCTYPE html>
<html>
<head><title>Deposit</title><link rel="stylesheet" href="style.css"></head>
<body>

<h2>Deposit</h2>

<div class="card">
<p>Scan QR atau transfer:</p>

<img src="https://via.placeholder.com/200">

<p>BCA: 1234567890</p>
<p>a.n Golden Investment</p>

<input id="amount" placeholder="Jumlah">
<button onclick="submit()">Konfirmasi</button>
</div>

<script type="module">
import { supabase, getUser } from "./app.js";

window.submit = async ()=>{
  let amount=parseFloat(document.getElementById("amount").value);

  await supabase.from("transactions").insert([{
    email:getUser(),
    type:"deposit",
    amount,
    status:"pending"
  }]);

  alert("Menunggu admin");
};
</script>

</body>
</html>
