<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Golden Investment</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0b0b0f, #111);
  color: #d4af37;
  text-align: center;
}

.header {
  padding: 20px;
  font-size: 24px;
  border-bottom: 1px solid #d4af37;
}

.container {
  margin-top: 30px;
}

.card {
  display: inline-block;
  padding: 20px;
  margin: 10px;
  background: #111;
  border: 1px solid #d4af37;
  border-radius: 12px;
  width: 250px;
}

h2 {
  margin: 10px 0;
}

.button-area {
  margin-top: 40px;
}

button {
  padding: 12px 25px;
  background: #d4af37;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  margin: 5px;
}
</style>

</head>

<body>

<div class="header">
  Golden Investment Dashboard
</div>

<div class="container">

  <div class="card">
    <h3>Balance</h3>
    <h2 id="balance">$10,000</h2>
  </div>

  <div class="card">
    <h3>Profit Today</h3>
    <h2 id="profit">0%</h2>
  </div>

  <div class="card">
    <h3>Total Profit</h3>
    <h2 id="total">$0</h2>
  </div>

</div>

<div class="button-area">
  <button onclick="goDeposit()">Deposit</button>
  <button onclick="goWithdraw()">Withdraw</button>
</div>

<script>
let balance = localStorage.getItem("balance") 
  ? parseFloat(localStorage.getItem("balance")) 
  : 10000;

let totalProfit = localStorage.getItem("profit") 
  ? parseFloat(localStorage.getItem("profit")) 
  : 0;

function updateProfit() {
  let change = (Math.random() * 2 - 1); // -1% sampai +1%
  let profit = balance * (change / 100);

  totalProfit += profit;
  balance += profit;
localStorage.setItem("balance", balance);
localStorage.setItem("profit", totalProfit);
  document.getElementById("balance").innerText = "$" + balance.toFixed(2);
  document.getElementById("profit").innerText = change.toFixed(2) + "%";
  document.getElementById("total").innerText = "$" + totalProfit.toFixed(2);
}

setInterval(updateProfit, 2000);

function goDeposit() {
  window.location.href = "deposit.html";
}

function goWithdraw() {
  window.location.href = "withdraw.html";
}
</script>

</body>
</html>
