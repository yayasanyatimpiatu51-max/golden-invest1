<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Dashboard</h2>
<p id="user"></p>

<div class="card">
  <h3>Balance</h3>
  <h1 id="balance">0</h1>
</div>

<button onclick="goDeposit()">Deposit</button>
<button onclick="goWithdraw()">Withdraw</button>
<button onclick="goHistory()">History</button>
<button onclick="logout()">Logout</button>

<script type="module">
import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm";

const supabase = createClient(
  "https://fqqhekmxkrwatfhephpr.supabase.co",
  "PASTE_ANON_KEY_KAMU"
);

let email;
let balance = 0;

// 🔥 LOAD USER
async function load(){
  const { data: { session } } = await supabase.auth.getSession();

  if(!session){
    location.href="login.html";
    return;
  }

  email = session.user.email;
  document.getElementById("user").innerText = email;

  let { data } = await supabase
    .from("users")
    .select("*")
    .eq("email", email)
    .single();

  if(!data){
    await supabase.from("users").insert([
      { email: email, balance: 10000 }
    ]);
    balance = 10000;
  } else {
    balance = data.balance;
  }

  updateUI();
}

function updateUI(){
  document.getElementById("balance").innerText =
    "Rp " + Number(balance).toLocaleString();
}

// 🔗 NAVIGATION
window.goDeposit = ()=>location.href="deposit.html";
window.goWithdraw = ()=>location.href="withdraw.html";
window.goHistory = ()=>location.href="history.html";

// 🔐 LOGOUT
window.logout = async ()=>{
  await supabase.auth.signOut();
  location.href="login.html";
};

load();
</script>

</body>
</html>
