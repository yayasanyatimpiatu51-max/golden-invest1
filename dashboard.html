<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<h2>Golden Investment Dashboard</h2>

<div class="card">
  <h3>Balance</h3>
  <h2 id="balance">$10000</h2>
</div>

<div class="card">
  <h3>Profit</h3>
  <h2 id="profit">0%</h2>
</div>

<div class="card">
  <h3>Total Profit</h3>
  <h2 id="total">$0</h2>
</div>

<br>

<button onclick="goDeposit()">Deposit</button>
<button onclick="goWithdraw()">Withdraw</button>

<script>
let balance = localStorage.getItem("balance")
  ? parseFloat(localStorage.getItem("balance"))
  : 10000;

let total = localStorage.getItem("total")
  ? parseFloat(localStorage.getItem("total"))
  : 0;

function update(){
  let change = (Math.random()*0.3 - 0.15);
  let profit = balance*(change/100);

  balance += profit;
  total += profit;

  localStorage.setItem("balance", balance);
  localStorage.setItem("total", total);

  document.getElementById("balance").innerText="$"+balance.toFixed(2);
  document.getElementById("profit").innerText=change.toFixed(2)+"%";
  document.getElementById("total").innerText="$"+total.toFixed(2);
}

setInterval(update,5000);

function goDeposit(){
  window.location.href="deposit.html";
}

function goWithdraw(){
  window.location.href="withdraw.html";
}
</script>

</body>
</html>
