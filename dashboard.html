<!DOCTYPE html>
<html>
<head><title>Dashboard</title><link rel="stylesheet" href="style.css"></head>
<body>

<h2>Dashboard</h2>
<p id="user"></p>

<div class="card">
<h3>Saldo</h3>
<h1 id="balance">0</h1>
</div>

<button onclick="goDeposit()">Deposit</button>
<button onclick="goWithdraw()">Withdraw</button>
<button onclick="goHistory()">History</button>
<button onclick="logout()">Logout</button>

<script type="module">
import { supabase, getUser } from "./app.js";

let email = getUser();
document.getElementById("user").innerText=email;

let balance=0;

async function load(){
  let { data } = await supabase.from("users")
    .select("*").eq("email",email).single();

  if(!data){
    await supabase.from("users").insert([{email,balance:10000}]);
    balance=10000;
  } else balance=data.balance;

  update();
}

function update(){
  document.getElementById("balance").innerText=
    "Rp "+Number(balance).toLocaleString();
}

window.goDeposit=()=>location.href="deposit.html";
window.goWithdraw=()=>location.href="withdraw.html";
window.goHistory=()=>location.href="history.html";

window.logout=()=>{
  localStorage.clear();
  location.href="login.html";
};

load();
</script>

</body>
</html>
