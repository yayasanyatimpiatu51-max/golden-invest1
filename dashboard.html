<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body{background:#0b0b0f;color:white;text-align:center;font-family:sans-serif}
.card{background:#151515;padding:20px;margin:20px;border-radius:10px}
button{padding:12px;margin:10px;background:gold;border:none;border-radius:8px}
</style>
</head>
<body>

<h2>Dashboard</h2>
<p id="user"></p>

<div class="card">
<h3>Balance</h3>
<h1 id="balance">0</h1>
</div>

<button onclick="goDeposit()">Deposit</button>
<button onclick="goWithdraw()">Withdraw</button>
<button onclick="goHistory()">History</button>

<script>
const SUPABASE_URL = "https://fqqhekmxkrwatfhephpr.supabase.co";
const SUPABASE_KEY = "PASTE_KEY_KAMU";

let user = localStorage.getItem("user");
if(!user){
  user = "user@test.com";
  localStorage.setItem("user",user);
}

document.getElementById("user").innerText = user;

async function load(){
  let res = await fetch(SUPABASE_URL+"/rest/v1/users?email=eq."+user,{
    headers:{
      apikey:SUPABASE_KEY,
      Authorization:"Bearer "+SUPABASE_KEY
    }
  });

  let data = await res.json();

  if(data.length===0){
    await fetch(SUPABASE_URL+"/rest/v1/users",{
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        apikey:SUPABASE_KEY,
        Authorization:"Bearer "+SUPABASE_KEY
      },
      body:JSON.stringify({email:user,balance:10000})
    });
    document.getElementById("balance").innerText="Rp 10.000";
  }else{
    document.getElementById("balance").innerText="Rp "+data[0].balance;
  }
}

function goDeposit(){location.href="deposit.html";}
function goWithdraw(){location.href="withdraw.html";}
function goHistory(){location.href="history.html";}

load();
</script>

</body>
</html>
