<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - Golden Investment</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0b0b0f, #111);
  color: #d4af37;
}

.header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  border-bottom: 1px solid #d4af37;
}

.container {
  padding: 30px;
  text-align: center;
}

.card {
  display: inline-block;
  padding: 20px;
  margin: 10px;
  background: #111;
  border: 1px solid #d4af37;
  border-radius: 12px;
  width: 250px;
}

h2 {
  margin: 0;
}
</style>

</head>

<body>

<div class="header">
  Golden Investment Dashboard
</div>

<div class="container">

  <div class="card">
    <h3>Balance</h3>
    <h2>$10,000</h2>
  </div>

  <div class="card">
    <h3>Profit Today</h3>
    <h2>+0.85%</h2>
  </div>

  <div class="card">
    <h3>Total Profit</h3>
    <h2>$850</h2>
  </div>

</div>

</body>
</html>
