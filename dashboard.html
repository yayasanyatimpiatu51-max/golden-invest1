  display: inline-block;
  padding: 20px;
  margin: 10px;
  background: #111;

  width: 250px;
}

h2 {
  margin: 10px 0;

<body>

<div class="header">
  Golden Investment Dashboard
</div>

<div class="card">
  <h3>Balance</h3>
  <h2 id="balance">$10,000</h2>
</div>

<div class="card">
  <h3>Profit Today</h3>
  <h2 id="profit">+0%</h2>
</div>

<div class="card">
  <h3>Total Profit</h3>
  <h2 id="total">$0</h2>
</div>

<script>
let balance = 10000;
let totalProfit = 0;

function updateProfit() {
  let change = (Math.random() * 2 - 1); // -1% sampai +1%
  let profit = balance * (change / 100);

  totalProfit += profit;
  balance += profit;

  document.getElementById("balance").innerText = "$" + balance.toFixed(2);
  document.getElementById("profit").innerText = change.toFixed(2) + "%";
  document.getElementById("total").innerText = "$" + totalProfit.toFixed(2);
}

setInterval(updateProfit, 2000);
</script>

</body>
