<!DOCTYPE html>
<html>
<body>

<h2>Admin</h2>
<div id="list"></div>

<script type="module">
import { supabase } from "./app.js";

async function load(){
  let { data } = await supabase.from("transactions")
    .select("*").eq("status","pending");

  let html="";
  data.forEach(tx=>{
    html+=`${tx.email} | ${tx.type} | ${tx.amount}
    <button onclick="approve('${tx.id}','${tx.email}','${tx.type}',${tx.amount})">OK</button><br>`;
  });

  document.getElementById("list").innerHTML=html;
}

window.approve = async(id,email,type,amount)=>{
  if(type==="deposit"){
    await supabase.rpc("add_balance",{user_email:email,amount});
  }else{
    await supabase.rpc("minus_balance",{user_email:email,amount});
  }

  await supabase.from("transactions")
    .update({status:"approved"}).eq("id",id);

  load();
};

load();
</script>

</body>
</html>
