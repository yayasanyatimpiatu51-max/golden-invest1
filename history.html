<!DOCTYPE html>
<html>
<body>

<h2>History</h2>
<div id="list"></div>

<script>
const URL="https://fqqhekmxkrwatfhephpr.supabase.co";
const KEY="PASTE_KEY_KAMU";

let user=localStorage.getItem("user");

async function load(){
  let res = await fetch(URL+"/rest/v1/transactions?email=eq."+user,{
    headers:{
      apikey:KEY,
      Authorization:"Bearer "+KEY
    }
  });

  let data=await res.json();

  let html="";
  data.forEach(x=>{
    html+=x.type+" | "+x.amount+" | "+x.status+"<br>";
  });

  document.getElementById("list").innerHTML=html;
}

load();
</script>

</body>
</html>
