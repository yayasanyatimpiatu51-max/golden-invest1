<!DOCTYPE html>
<html>
<body>

<h2>History</h2>
<div id="list"></div>

<script type="module">
import { supabase, getUser } from "./app.js";

async function load(){
  let { data } = await supabase.from("transactions")
    .select("*").eq("email",getUser());

  let html="";
  data.forEach(x=>{
    html+=x.type+" | "+x.amount+" | "+x.status+"<br>";
  });

  document.getElementById("list").innerHTML=html;
}
load();
</script>

</body>
</html>
